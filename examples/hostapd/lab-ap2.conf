# Lab AP 2 — OpenWRT VM, vwifi virtual radio.
# See docs/ar9271-phys-bridge-lab.md. Legacy/no-BA so the single-radio
# AR9271 ACK proxy only ever has to emit simple per-frame ACKs.

interface=wlan0          # the VM's vwifi virtual radio
driver=nl80211

ssid=Lab-AP-2
hw_mode=g
channel=6                # same channel as AP1/AP3
bssid=02:11:22:33:44:01  # differs from AP1 only in the low bits

ieee80211n=0
wmm_enabled=0

auth_algs=1
wpa=2
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
wpa_passphrase=batterystaple2
