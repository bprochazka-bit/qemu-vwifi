# Lab AP 1 — OpenWRT VM, vwifi virtual radio.
# Single-radio AR9271 phys-bridge lab (see docs/ar9271-phys-bridge-lab.md).
#
# Legacy (non-HT) so every data frame uses a simple per-frame ACK: this
# removes A-MPDU/Block-Ack and RTS/CTS, which are SIFS responses the
# single-radio ACK proxy does not generate. Crypto runs here in the VM;
# the AR9271 relays data frames raw and never holds keys.

interface=wlan0          # the VM's vwifi virtual radio
driver=nl80211

ssid=Lab-AP-1
hw_mode=g
channel=6                # all lab APs share one channel
bssid=02:11:22:33:44:00  # prefix-aligned; see BSSID table in the runbook

ieee80211n=0             # legacy → simple ACK, no aggregation/Block-Ack
wmm_enabled=0            # no QoS → no Block-Ack negotiation

auth_algs=1              # Open System auth (WPA2-PSK does the real auth)
wpa=2
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
wpa_passphrase=correcthorse1
